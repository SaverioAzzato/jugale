name: Tauri Rust Check

# Fast sanity check that the desktop shell's Rust code still compiles — cargo check only,
# no bundling. Full cross-platform builds + the GitHub Release happen on tag (release.yml).
on:
  pull_request:
    paths:
      - "src-tauri/**"
      - ".github/workflows/tauri-check.yml"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential curl wget file libxdo-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --locked
