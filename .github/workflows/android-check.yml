name: Android Update Check

# Desktop cargo check cannot compile Kotlin or merge the Android manifest. Build a debug APK when
# updater wiring changes, so failures are caught on PRs and direct main pushes before a tag.
on:
  push:
    branches:
      - main
    paths:
      - "src-tauri/plugins/android-updater/**"
      - "src-tauri/capabilities/android.json"
      - "src-tauri/src/lib.rs"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - "src/update/**"
      - ".github/workflows/android-check.yml"
  pull_request:
    paths:
      - "src-tauri/plugins/android-updater/**"
      - "src-tauri/capabilities/android.json"
      - "src-tauri/src/lib.rs"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - "src/update/**"
      - ".github/workflows/android-check.yml"
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "27.0.11902837"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Initialize Android project
        run: npx tauri android init --ci
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}

      - name: Build debug APK
        run: npx tauri android build --apk --debug --ci
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
